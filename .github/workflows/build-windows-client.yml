name: Build Windows Client

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'AdaptixClient/**'
      - '.github/workflows/build-windows-client.yml'
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        qt-version: ['6.7.0']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ matrix.qt-version }}
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtwebsockets'
          cache: true

      - name: Install OpenSSL
        run: choco install openssl -y

      - name: Install CMake
        run: choco install cmake -y

      - name: Configure with CMake
        working-directory: AdaptixClient
        run: |
          cmake -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release .

      - name: Build project
        working-directory: AdaptixClient
        run: |
          cmake --build . --config Release --parallel 4

      - name: Collect artifacts
        run: |
          mkdir -p dist
          if exist "AdaptixClient\Release\AdaptixClient.exe" (
            copy "AdaptixClient\Release\AdaptixClient.exe" "dist\AdaptixClient.exe"
          )

      - name: Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: AdaptixClient-Windows-x64-${{ github.run_number }}
          path: dist/
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/AdaptixClient.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}c