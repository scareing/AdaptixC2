name: Build Windows Client

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'AdaptixClient/**'
      - '.github/workflows/build-windows-client.yml'
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install dependencies via Chocolatey
        run: |
          choco install cmake -y
          choco install openssl -y
        shell: cmd

      - name: Install Qt6
        run: |
          python -m pip install --upgrade pip
          python -m pip install aqtinstall
          python -m aqt install-qt windows desktop 6.6.0 win64_msvc2022_64 --outputdir C:\Qt
        shell: powershell

      - name: Set environment variables
        run: |
          echo "Qt6_DIR=C:\Qt\6.6.0\msvc2022_64" >> $env:GITHUB_ENV
          echo "C:\Qt\6.6.0\msvc2022_64\bin" >> $env:GITHUB_PATH
        shell: powershell

      - name: Create build directory
        run: |
          cd AdaptixClient
          mkdir build
          cd build

      - name: Configure with CMake
        working-directory: AdaptixClient\build
        run: |
          cmake -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_PREFIX_PATH="C:\Qt\6.6.0\msvc2022_64" `
            ..
        shell: powershell

      - name: Build project
        working-directory: AdaptixClient\build
        run: |
          cmake --build . --config Release
        shell: cmd

      - name: Check build output
        run: |
          dir AdaptixClient\build\Release
        shell: cmd

      - name: Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AdaptixClient-Windows-x64
          path: AdaptixClient\build\Release\*.exe
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: AdaptixClient\build\Release\AdaptixClient.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}