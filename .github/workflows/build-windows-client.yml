name: Build Windows Client

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install tools
        run: |
          choco install cmake openssl -y
        shell: cmd

      - name: Download Qt6
        run: |
          python -m pip install aqtinstall
          python -m aqt install-qt windows desktop --outputdir C:\Qt 6.6.1 win64_msvc2022_64
        shell: powershell

      - name: Set Qt Path
        run: |
          echo "Qt6_DIR=C:\Qt\6.6.1\msvc2022_64\lib\cmake\Qt6" >> $env:GITHUB_ENV
        shell: powershell

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake -G "Visual Studio 17 2022" -A x64 `
            -DQt6_DIR="C:\Qt\6.6.1\msvc2022_64\lib\cmake\Qt6" `
            ../AdaptixClient
        shell: powershell

      - name: Build
        run: |
          cd build
          cmake --build . --config Release
        shell: cmd

      - name: Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AdaptixClient-Windows-x64
          path: build\Release\AdaptixClient.exe
          retention-days: 30