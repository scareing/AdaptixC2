name: Build Windows Client

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'AdaptixClient/**'
      - '.github/workflows/build-windows-client.yml'
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install CMake
        uses: kitware/cmake-action@v2
        with:
          cmake-version: '3.28'

      - name: Install Qt6 (using aqt)
        run: |
          python -m pip install --upgrade pip
          python -m pip install aqtinstall
          python -m aqt install-qt windows desktop 6.6.0 win64_msvc2022_64 --outputdir D:\a\AdaptixC2\Qt
        shell: pwsh

      - name: Install OpenSSL
        run: choco install openssl -y

      - name: Set Qt environment
        run: |
          echo "Qt6_DIR=D:\a\AdaptixC2\Qt\6.6.0\msvc2022_64" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "D:\a\AdaptixC2\Qt\6.6.0\msvc2022_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Configure with CMake
        working-directory: AdaptixClient
        run: |
          cmake -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_PREFIX_PATH="D:\a\AdaptixC2\Qt\6.6.0\msvc2022_64" `
            -DCMAKE_BUILD_TYPE=Release .
        shell: pwsh

      - name: Build project
        working-directory: AdaptixClient
        run: |
          cmake --build . --config Release --parallel 4

      - name: List build output
        run: |
          Get-ChildItem -Path "AdaptixClient\Release" -Recurse
        shell: pwsh

      - name: Collect artifacts
        run: |
          mkdir -p dist
          if (Test-Path "AdaptixClient\Release\AdaptixClient.exe") {
            Copy-Item "AdaptixClient\Release\AdaptixClient.exe" "dist\AdaptixClient.exe"
          } else {
            Write-Host "Looking for executable in subdirectories..."
            Get-ChildItem -Path "AdaptixClient" -Filter "*.exe" -Recurse
          }
        shell: pwsh

      - name: Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AdaptixClient-Windows-x64-${{ github.run_number }}
          path: dist/
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/AdaptixClient.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}